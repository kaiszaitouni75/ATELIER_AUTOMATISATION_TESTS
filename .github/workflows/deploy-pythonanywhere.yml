name: Deploy to PythonAnywhere

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -c "import ast; ast.parse(open('flask_app.py').read()); print('flask_app.py OK')"
          python -c "import ast; ast.parse(open('storage.py').read()); print('storage.py OK')"
          python -c "import ast; ast.parse(open('tester/client.py').read()); print('client.py OK')"
          python -c "import ast; ast.parse(open('tester/tests.py').read()); print('tests.py OK')"
          python -c "import ast; ast.parse(open('tester/runner.py').read()); print('runner.py OK')"

      - name: Upload flask_app.py
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/flask_app.py" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@flask_app.py"

      - name: Upload storage.py
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/storage.py" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@storage.py"

      - name: Upload requirements.txt
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/requirements.txt" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@requirements.txt"

      - name: Upload tester/client.py
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/tester/client.py" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@tester/client.py"

      - name: Upload tester/tests.py
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/tester/tests.py" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@tester/tests.py"

      - name: Upload tester/runner.py
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/tester/runner.py" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@tester/runner.py"

      - name: Upload tester/__init__.py
        run: |
          echo "" > /tmp/__init__.py
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/tester/__init__.py" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@/tmp/__init__.py"

      - name: Upload templates/dashboard.html
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/files/path${{ secrets.PA_TARGET_DIR }}/templates/dashboard.html" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}" \
            -F "content=@templates/dashboard.html"

      - name: Reload web app
        run: |
          curl -sf -X POST \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_WEBAPP_DOMAIN }}/reload/" \
            -H "Authorization: Token ${{ secrets.PA_TOKEN }}"

      - name: Done
        run: |
          echo "✅ Déployé sur https://${{ secrets.PA_WEBAPP_DOMAIN }}"
